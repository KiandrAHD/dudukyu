<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Akun - DudukYu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-visual" aria-hidden="true"></section>
        <section class="auth-panel">
            <div class="auth-card">
                <img class="auth-logo" src="../assets/login-regis/DudukYuk%20_Logo.png" alt="Logo DudukYu">
                <h1>Buat Akun</h1>

                <form id="registerForm" class="auth-form" novalidate>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="Example@email.com" autocomplete="email" required>

                    <label for="password">Buat Password</label>
                    <input id="password" name="password" type="password" placeholder="Password" autocomplete="new-password" required minlength="6">

                    <p id="formMessage" class="form-message" aria-live="polite"></p>

                    <button id="submitButton" type="submit" class="auth-button">Buat Akun</button>
                </form>

                <button type="button" class="auth-link-button" onclick="goLogin()">Masuk Dengan Akun</button>
            </div>
        </section>
    </main>

    <script src="../js/register.js"></script>
</body>
</html>
